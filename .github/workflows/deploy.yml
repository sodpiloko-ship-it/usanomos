name: Deploy a Hostinger

# Despliega la LANDING estatica a Hostinger por FTP en cada push a main.
# (Esto es solo el SITIO de marketing de Nomos — NO la app Flask, que va en un host Python.)
# Requiere 3 secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER / FTP_USERNAME / FTP_PASSWORD  (de hPanel -> Archivos -> Cuentas FTP)
# Ajusta server-dir al public_html del dominio (o subdominio) de la landing.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir por FTP a Hostinger
        # se salta (workflow en verde) mientras no existan los secrets FTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
